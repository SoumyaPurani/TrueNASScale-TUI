services:
  truenasscale-tui:
    build: .
    image: truenasscale-tui
    container_name: truenasscale-tui
    stdin_open: true
    tty: true
    env_file:
      - path: .env
        required: false
    environment:
      - TRUENAS_SERVER=${TRUENAS_SERVER:-truenas.local}
      - TRUENAS_API_KEY=${TRUENAS_API_KEY:-}
      - TRUENAS_USERNAME=${TRUENAS_USERNAME:-admin}
      - TRUENAS_VERIFY_SSL=${TRUENAS_VERIFY_SSL:-false}
